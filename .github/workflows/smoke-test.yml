name: Smoke Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-smoke:
    name: Backend Smoke Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python dependencies
        run: uv sync

      - name: Create .env for CI
        run: |
          cp .env.example .env
          sed -i 's|MONGODB_URL=.*|MONGODB_URL=mongodb://127.0.0.1:27017|' .env
          sed -i 's|JWT_SECRET_KEY=.*|JWT_SECRET_KEY=ci-test-secret-key-for-smoke-test|' .env
          # pydantic-settings v2 requires JSON array format for List[str] fields
          sed -i 's|CORS_ORIGINS=.*|CORS_ORIGINS=["http://localhost:3000"]|' .env
          sed -i 's|CORS_ALLOW_METHODS=.*|CORS_ALLOW_METHODS=["*"]|' .env
          sed -i 's|CORS_ALLOW_HEADERS=.*|CORS_ALLOW_HEADERS=["*"]|' .env
          sed -i 's|ALLOWED_FILE_EXTENSIONS=.*|ALLOWED_FILE_EXTENSIONS=[".pdf",".doc",".docx"]|' .env

      - name: Start backend server
        run: |
          uv run uvicorn main:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/server.pid

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Server is ready after ${i}s"
              break
            fi
            echo "Waiting... (${i}/30)"
            sleep 1
          done

      - name: Health check
        run: |
          RESP=$(curl -sf http://localhost:8000/health)
          echo "Response: $RESP"
          echo "$RESP" | grep -q '"database":"connected"' || \
            (echo "Database not connected!" && exit 1)

      - name: Login API smoke test
        run: |
          RESP=$(curl -sf -X POST http://localhost:8000/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"Admin@123"}')
          echo "Response: $RESP"
          echo "$RESP" | grep -q '"success":true' || \
            (echo "Login failed!" && exit 1)

      - name: Stop backend server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) 2>/dev/null || true
          fi

  frontend-smoke:
    name: Frontend Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: simple-ats-rating-ui
        run: bun install

      - name: Build frontend
        working-directory: simple-ats-rating-ui
        run: bun run build

      - name: Start production server
        working-directory: simple-ats-rating-ui
        run: |
          API_PROXY_TARGET=http://localhost:8000 bun run start &
          echo $! > /tmp/frontend.pid

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend server is ready after ${i}s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "Frontend server failed to start!"
              exit 1
            fi
            echo "Waiting... (${i}/30)"
            sleep 1
          done

      - name: Verify HTML response
        run: |
          RESP=$(curl -sf http://localhost:3000)
          echo "$RESP" | grep -q '<div id="root">' || \
            (echo "Missing root div!" && exit 1)
          echo "HTML response OK"

      - name: Verify static assets loadable
        run: |
          # 从 HTML 中提取 JS 资源路径并验证可访问
          RESP=$(curl -sf http://localhost:3000)
          JS_PATH=$(echo "$RESP" | grep -oP 'src="[^"]*\.js"' | head -1 | grep -oP '"[^"]*"' | tr -d '"')
          if [ -n "$JS_PATH" ]; then
            STATUS=$(curl -o /dev/null -sf -w "%{http_code}" "http://localhost:3000${JS_PATH}")
            [ "$STATUS" = "200" ] || (echo "JS asset returned $STATUS" && exit 1)
            echo "JS asset OK: $JS_PATH"
          else
            echo "No JS asset found in HTML, skipping"
          fi

      - name: Stop frontend server
        if: always()
        run: |
          if [ -f /tmp/frontend.pid ]; then
            kill $(cat /tmp/frontend.pid) 2>/dev/null || true
          fi
